# Enrutamiento de modelos por agente SDD y propósito
# Basado en: código de gentle-ai v2.1.10, catálogo opencode models 2026-07-20
# Última actualización: 2026-07-20

# Perfiles de enrutamiento
profiles:
  economic:
    description: "Mínimo consumo, escalar solo cuando sea necesario"
    default_reasoning: low
    
  balanced:
    description: "Calidad consistente con costos controlados"
    default_reasoning: medium
    
  powerful:
    description: "Máxima calidad en fases de alta decisión"
    default_reasoning: high

# Rutas por subagente Gentle-AI
subagent_routing:
  gentle-orchestrator:
    role: "Orquestador principal"
    risk: high
    recommended_reasoning: high
    models:
      openai: openai/gpt-5.6-sol
      google: openrouter/google/gemini-3.5-flash
      anthropic: openrouter/anthropic/claude-sonnet-5
      opencode-go: opencode-go/kimi-k3
    fallback:
      - openai/gpt-5.6-terra
      - opencode-go/deepseek-v4-pro

  sdd-init:
    role: "Inicialización SDD del proyecto"
    risk: low
    recommended_reasoning: low
    models:
      openai: openai/gpt-5.6-luna
      google: openrouter/google/gemini-3.1-flash-lite
      anthropic: openrouter/anthropic/claude-haiku-4.5
      opencode-go: opencode-go/deepseek-v4-flash
