      openai: openai/gpt-5.6-sol
      anthropic: openrouter/anthropic/claude-opus-4.8
      opencode-go: opencode-go/qwen3.7-max

# Reglas de enrutamiento generales
routing_rules:
  - if: "tool_calling_required AND model_does_not_support_tool_call"
    then: "NO ASIGNAR. Buscar modelo alternativo con tool calling verificado."

  - if: "reasoning > model_capability"
    then: "Escalar a modelo superior o reducir complejidad de la tarea."

  - if: "cost_exceeded AND low_risk"
    then: "Usar modelo económico del mismo proveedor."

  - if: "provider_unavailable"
    then: "Usar fallback del mismo nivel de razonamiento."

  - if: "two_consecutive_failures"
    then: "Escalar al siguiente nivel de capacidad."

  - if: "security_critical OR release"
    then: "Usar modelo frontier. No delegar a económico."
