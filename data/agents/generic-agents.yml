# Generic agent profiles — 25 user-creatable agents beyond the built-in Gentle ecosystem
# Based on: gentle-ai v2.1.10 agent architecture, SDD methodology, routing profile system
# Last updated: 2026-07-20

agents:
  - id: "investigador"
    name: "Investigador"
    type: explorer
    system_prompt_summary: "Research agent for codebase exploration, technology evaluation, and deep investigation. Gathers facts, reads documentation, and produces analysis reports."
    allowed_tools: [read, glob, grep, lsp, webfetch, websearch]
    forbidden_tools: [write, edit, bash]
    recommended_model:
      openai: openai/gpt-5.6-terra
      google: openrouter/google/gemini-3.5-flash
      anthropic: openrouter/anthropic/claude-sonnet-5
      opencode-go: opencode-go/deepseek-v4-pro
    reasoning_level: medium
    temperature: 0.3
    cost_level: balanced
    appropriate_cases: [research, technology evaluation, codebase exploration, "how does X work?", reading APIs/docs]
    inappropriate_cases: ["implement code", "deploy changes", "modify production configs"]
    fallback: openai/gpt-5.6-luna
    escalation_criteria: "Unclear findings → escalate to powerful model"

