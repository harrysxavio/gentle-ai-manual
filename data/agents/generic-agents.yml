      anthropic: openrouter/anthropic/claude-sonnet-5
      opencode-go: opencode-go/kimi-k3
    reasoning_level: high
    temperature: 0.5
    cost_level: powerful
    appropriate_cases: [requirements gathering, user stories, stakeholder alignment, feature scoping]
    inappropriate_cases: [implementation, code review, architectural decision without evidence]
    fallback: openai/gpt-5.6-terra
    escalation_criteria: "Ambiguous requirements → escalate to architect review"

