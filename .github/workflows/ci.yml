name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      
      - run: npm ci

      - name: Install Chromium for Playwright and Mermaid
        run: npx playwright install --with-deps chromium

      - name: Validate course (static + build)
        run: npm run validate

      - name: Start preview server for visual tests
        run: |
          npx astro preview --port 4321 &
          PREVIEW_PID=$!

          cleanup() {
            kill "$PREVIEW_PID" 2>/dev/null || true
            wait "$PREVIEW_PID" 2>/dev/null || true
          }

          trap cleanup EXIT

          READY=false

          for i in $(seq 1 30); do
            if curl --fail --silent --output /dev/null \
              http://localhost:4321/gentle-ai-manual/; then
              echo "Preview server ready after ${i}s"
              READY=true
              break
            fi
            sleep 1
          done

          if [ "$READY" != "true" ]; then
            echo "::error::Preview server did not become ready within 30 seconds"
            exit 1
          fi

          npm run test:visual

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
